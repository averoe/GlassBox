version: '3.8'

services:
  glassbox:
    build: .
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=info
      - ENABLE_TRACE_UI=true
    volumes:
      - ./config:/app/config
      - ./data:/app/data
    depends_on:
      - qdrant
      - postgres

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: glassbox
      POSTGRES_PASSWORD: glassbox
      POSTGRES_DB: glassbox_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Optional: Ollama for local embeddings
  # ollama:
  #   image: ollama/ollama:latest
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama

volumes:
  qdrant_storage:
  postgres_data:
  # ollama_data:
